<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindeck — Logos v7 (shapes + favicon)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f5f5f5; font-family: 'Inter', sans-serif; }
      h2 {
        padding: 40px 24px 16px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
      }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 16px 24px 40px; }
      .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 16px 24px 40px; }
      .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; padding: 16px 24px 40px; }
      .cell {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }
      .combo { display: flex; align-items: center; gap: 14px; }
      .wm { font-family: 'Inter'; font-weight: 800; font-size: 38px; line-height: 1; letter-spacing: -0.05em; }

      /* Shapes pour icônes */
      .icon-cell {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>

    <h2>Logo principal — formes de fond sombre</h2>
    <div class="grid">

      <!-- 1 : Rectangle arrondi (squircle) -->
      <div class="cell">
        <div style="background:#0c0c14; border-radius:22px; padding:28px 36px; display:flex; align-items:center; gap:14px;">
          <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
            <circle cx="30" cy="30" r="10" fill="#C9956B"/>
            <circle cx="70" cy="30" r="10" fill="#C9956B"/>
            <circle cx="50" cy="55" r="10" fill="#C9956B"/>
            <circle cx="25" cy="75" r="10" fill="#C9956B"/>
            <circle cx="75" cy="75" r="10" fill="#C9956B"/>
            <line x1="30" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="70" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="30" y1="30" x2="70" y2="30" stroke="#C9956B" stroke-width="5"/>
            <line x1="25" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="75" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>
        </div>
      </div>

      <!-- 2 : Coins arrondis diagonale (haut-gauche + bas-droite) -->

        <div style="background:#0c0c14; border-radius:22px 6px 22px 6px; padding:28px 36px; display:flex; align-items:center; gap:14px;">

            <circle cx="30" cy="30" r="10" fill="#C9956B"/>
            <circle cx="70" cy="30" r="10" fill="#C9956B"/>
            <circle cx="50" cy="55" r="10" fill="#C9956B"/>
            <circle cx="25" cy="75" r="10" fill="#C9956B"/>
            <circle cx="75" cy="75" r="10" fill="#C9956B"/>
            <line x1="30" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="70" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="30" y1="30" x2="70" y2="30" stroke="#C9956B" stroke-width="5"/>
            <line x1="25" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="75" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>
        </div>
      </div>

      <!-- 3 : Coins arrondis diagonale inversée (haut-droite + bas-gauche) -->

        <div style="background:#0c0c14; border-radius:6px 22px 6px 22px; padding:28px 36px; display:flex; align-items:center; gap:14px;">

          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>

      <!-- 4 : Pill (très arrondi) -->

        <div style="background:#0c0c14; border-radius:60px; padding:24px 40px; display:flex; align-items:center; gap:14px;">

          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>
        </div>

      <!-- 5 : Sans fond (transparent, juste le logo) -->
      <div class="cell">
        <div style="padding:28px 36px; display:flex; align-items:center; gap:14px;">
          <svg width="44" height="44" viewBox="0 0 100 100" fill="none">

            <line x1="30" y1="30" x2="70" y2="30" stroke="#C9956B" stroke-width="5"/>
            <line x1="25" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>

          </svg>

        </div>

      <!-- 6 : Bordure fine, pas de fond -->
      <div class="cell">
        <div style="border:2px solid #C9956B; border-radius:16px; padding:24px 32px; display:flex; align-items:center; gap:14px;">

            <circle cx="25" cy="75" r="10" fill="#C9956B"/>
            <circle cx="75" cy="75" r="10" fill="#C9956B"/>
            <line x1="30" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="70" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="30" y1="30" x2="70" y2="30" stroke="#C9956B" stroke-width="5"/>
            <line x1="25" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>

          </svg>
