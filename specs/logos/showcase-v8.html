<!DOCTYPE html>

  <head>

    <title>Mindeck — v8 finale (diag 2 vs 3)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f5f5f5; font-family: 'Inter', sans-serif; }
      h2 {
        padding: 40px 24px 16px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
      }
      .versus {
        display: grid;
        grid-template-columns: 1fr 60px 1fr;
        align-items: center;
        padding: 40px 40px 60px;
      }
      .vs-label {
        text-align: center;
        font-size: 28px;
        font-weight: 900;
        color: #ccc;
      }
      .side {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .side-label {
        font-size: 11px;
        font-weight: 600;
        color: #aaa;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .combo { display: flex; align-items: center; gap: 16px; }
      .wm { font-family: 'Inter'; font-weight: 800; font-size: 44px; line-height: 1; letter-spacing: -0.05em; }

      .row { display: flex; gap: 40px; justify-content: center; padding: 24px 24px 48px; flex-wrap: wrap; }

  </head>

    <h2>Shape 2 vs Shape 3 — grand format</h2>
    <div class="versus">
      <div class="side">
        <div class="side-label">Shape 2 — ↖ arrondi ↘ arrondi</div>
        <div style="background:#0c0c14; border-radius:28px 6px 28px 6px; padding:36px 48px; display:flex; align-items:center; gap:18px;">
          <svg width="52" height="52" viewBox="0 0 100 100" fill="none">
            <circle cx="30" cy="30" r="10" fill="#C9956B"/>
            <circle cx="70" cy="30" r="10" fill="#C9956B"/>
            <circle cx="50" cy="55" r="10" fill="#C9956B"/>
            <circle cx="25" cy="75" r="10" fill="#C9956B"/>
            <circle cx="75" cy="75" r="10" fill="#C9956B"/>
            <line x1="30" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="70" y1="30" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="30" y1="30" x2="70" y2="30" stroke="#C9956B" stroke-width="5"/>
            <line x1="25" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
            <line x1="75" y1="75" x2="50" y2="55" stroke="#C9956B" stroke-width="5"/>
          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>
        </div>
      </div>

      <div class="vs-label">VS</div>

      <div class="side">
        <div class="side-label">Shape 3 — ↗ arrondi ↙ arrondi</div>
        <div style="background:#0c0c14; border-radius:6px 28px 6px 28px; padding:36px 48px; display:flex; align-items:center; gap:18px;">

            <circle cx="50" cy="55" r="10" fill="#C9956B"/>
            <circle cx="25" cy="75" r="10" fill="#C9956B"/>
            <circle cx="75" cy="75" r="10" fill="#C9956B"/>

          </svg>
          <span class="wm" style="color:#fff;">Mind<span style="color:#C9956B;">eck</span></span>
        </div>
      </div>
    </div>
