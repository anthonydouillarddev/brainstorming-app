<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindeck — Logos v2</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fff; }
      .grid { display: grid; grid-template-columns: repeat(5, 1fr); }
      .cell {
        aspect-ratio: 1;
        border: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .cell svg {
        width: 100%;
        height: 100%;
        max-width: 140px;
        max-height: 140px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <!-- 1. Deck fanné 5 cartes — éventail large -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="210" y="150" width="80" height="220" rx="12" fill="#000" transform="rotate(-32 250 370)"/>
          <rect x="210" y="150" width="80" height="220" rx="12" fill="#000" transform="rotate(-16 250 370)" opacity="0.75"/>
          <rect x="210" y="150" width="80" height="220" rx="12" fill="#000" opacity="0.6"/>
          <rect x="210" y="150" width="80" height="220" rx="12" fill="#000" transform="rotate(16 250 370)" opacity="0.45"/>
          <rect x="210" y="150" width="80" height="220" rx="12" fill="#000" transform="rotate(32 250 370)" opacity="0.3"/>
        </svg>
      </div>

      <!-- 2. 3 cartes empilées décalées — tapis posé -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="80" y="160" width="260" height="200" rx="18" fill="#000" opacity="0.35" transform="rotate(-8 210 260)"/>
          <rect x="120" y="150" width="260" height="200" rx="18" fill="#000" opacity="0.6"/>
          <rect x="160" y="140" width="260" height="200" rx="18" fill="#000" transform="rotate(6 290 240)"/>
        </svg>
      </div>

      <!-- 3. Carte + point (idée/spark) en haut à droite -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="100" y="140" width="260" height="320" rx="26" fill="#000"/>
          <circle cx="380" cy="120" r="56" fill="#000"/>
        </svg>
      </div>

      <!-- 4. Deck isométrique 3D -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M100 200 L250 130 L400 200 L400 330 L250 400 L100 330 Z" fill="#000"/>
          <path d="M100 200 L250 270 L400 200" stroke="#fff" stroke-width="10" fill="none"/>
          <path d="M250 270 L250 400" stroke="#fff" stroke-width="10"/>
          <path d="M250 270 L100 200" stroke="#fff" stroke-width="10" opacity="0.5"/>
        </svg>
      </div>

      <!-- 5. Carte à coin corné (dog-ear) — détail éditorial -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M100 110 H340 L410 180 V390 H100 Z" fill="#000"/>
          <path d="M340 110 V180 H410 Z" fill="#fff"/>
          <path d="M340 110 L410 180" stroke="#000" stroke-width="8"/>
        </svg>
      </div>

      <!-- 6. Pile de cartes vue de dessus — strates + épaisseur -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="90" y="140" width="320" height="220" rx="22" fill="#000"/>
          <line x1="90" y1="380" x2="410" y2="380" stroke="#000" stroke-width="10" opacity="0.6"/>
          <line x1="105" y1="400" x2="395" y2="400" stroke="#000" stroke-width="10" opacity="0.35"/>
          <line x1="130" y1="420" x2="370" y2="420" stroke="#000" stroke-width="10" opacity="0.18"/>
        </svg>
      </div>

      <!-- 7. Carte avec mind-map à l'intérieur -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="90" y="110" width="320" height="280" rx="24" stroke="#000" stroke-width="20" fill="none"/>
          <circle cx="250" cy="250" r="32" fill="#000"/>
          <circle cx="160" cy="180" r="18" fill="#000"/>
          <circle cx="340" cy="180" r="18" fill="#000"/>
          <circle cx="160" cy="320" r="18" fill="#000"/>
          <circle cx="340" cy="320" r="18" fill="#000"/>
          <line x1="250" y1="250" x2="160" y2="180" stroke="#000" stroke-width="10"/>
          <line x1="250" y1="250" x2="340" y2="180" stroke="#000" stroke-width="10"/>
          <line x1="250" y1="250" x2="160" y2="320" stroke="#000" stroke-width="10"/>
          <line x1="250" y1="250" x2="340" y2="320" stroke="#000" stroke-width="10"/>
        </svg>
      </div>

      <!-- 8. 4 cartes en grille 2×2 (cockpit) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="90" y="90" width="180" height="180" rx="22" fill="#000"/>
          <rect x="290" y="90" width="180" height="180" rx="22" fill="#000" opacity="0.55"/>
          <rect x="90" y="290" width="180" height="180" rx="22" fill="#000" opacity="0.55"/>
          <rect x="290" y="290" width="180" height="180" rx="22" fill="#000"/>
        </svg>
      </div>

      <!-- 9. Flow / pipeline : 3 cartes reliées par flèche -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="60" y="200" width="100" height="100" rx="16" fill="#000"/>
          <rect x="200" y="200" width="100" height="100" rx="16" fill="#000"/>
          <rect x="340" y="200" width="100" height="100" rx="16" fill="#000"/>
          <path d="M160 250 H200 M300 250 H340" stroke="#000" stroke-width="14" stroke-linecap="round"/>
          <path d="M430 210 L460 250 L430 290" stroke="#000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

      <!-- 10. Sablier / losange double (idée → exécution) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M120 100 H380 L250 250 L380 400 H120 L250 250 Z" fill="#000"/>
        </svg>
      </div>

      <!-- 11. Prism éclaté — cristal d'idées -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M250 80 L400 200 L330 420 L170 420 L100 200 Z" fill="#000"/>
          <path d="M250 80 L330 420 L170 420 Z" fill="#fff" opacity="0.25"/>
          <path d="M250 80 L400 200 L250 240 Z" fill="#fff" opacity="0.15"/>
        </svg>
      </div>

      <!-- 12. Cerveau-grille (8×8) avec nodes mis en avant -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g fill="#000">
            <circle cx="140" cy="160" r="14"/><circle cx="200" cy="160" r="14" opacity="0.3"/><circle cx="260" cy="160" r="14"/><circle cx="320" cy="160" r="14" opacity="0.3"/><circle cx="380" cy="160" r="14"/>
            <circle cx="140" cy="220" r="14" opacity="0.3"/><circle cx="200" cy="220" r="14"/><circle cx="260" cy="220" r="14" opacity="0.3"/><circle cx="320" cy="220" r="14"/><circle cx="380" cy="220" r="14" opacity="0.3"/>
            <circle cx="140" cy="280" r="14"/><circle cx="200" cy="280" r="14" opacity="0.3"/><circle cx="260" cy="280" r="14"/><circle cx="320" cy="280" r="14" opacity="0.3"/><circle cx="380" cy="280" r="14"/>
            <circle cx="140" cy="340" r="14" opacity="0.3"/><circle cx="200" cy="340" r="14"/><circle cx="260" cy="340" r="14" opacity="0.3"/><circle cx="320" cy="340" r="14"/><circle cx="380" cy="340" r="14" opacity="0.3"/>
          </g>
        </svg>
      </div>

      <!-- 13. Deck ouvert — livre/dossier -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M90 150 L250 200 V420 L90 370 Z" fill="#000"/>
          <path d="M410 150 L250 200 V420 L410 370 Z" fill="#000" opacity="0.6"/>
          <line x1="250" y1="200" x2="250" y2="420" stroke="#fff" stroke-width="6"/>
        </svg>
      </div>

      <!-- 14. Cible / cockpit concentrique -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="250" cy="250" r="190" stroke="#000" stroke-width="14" fill="none"/>
          <circle cx="250" cy="250" r="125" stroke="#000" stroke-width="14" fill="none" opacity="0.6"/>
          <circle cx="250" cy="250" r="60" fill="#000"/>
        </svg>
      </div>

      <!-- 15. Deck + check (projet validé/terminé) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="100" y="110" width="260" height="320" rx="26" fill="#000" opacity="0.35"/>
          <rect x="140" y="80" width="260" height="320" rx="26" fill="#000"/>
          <path d="M210 230 L260 280 L340 190" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

      <!-- 16. D monogram (première lettre de deck) enveloppant un point -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M110 100 H280 C 400 100, 430 200, 430 250 C 430 300, 400 400, 280 400 H110 Z" fill="#000"/>
          <rect x="180" y="170" width="180" height="160" rx="14" fill="#fff"/>
          <circle cx="270" cy="250" r="28" fill="#000"/>
        </svg>
      </div>

      <!-- 17. Escalier / progression (cartes étagées) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="70" y="320" width="110" height="120" rx="10" fill="#000" opacity="0.4"/>
          <rect x="195" y="240" width="110" height="200" rx="10" fill="#000" opacity="0.7"/>
          <rect x="320" y="140" width="110" height="300" rx="10" fill="#000"/>
        </svg>
      </div>

      <!-- 18. Feuilles/cartes rotatives (loto mental) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="200" y="130" width="100" height="240" rx="14" fill="#000" transform="rotate(0 250 250)"/>
          <rect x="200" y="130" width="100" height="240" rx="14" fill="#000" transform="rotate(60 250 250)" opacity="0.55"/>
          <rect x="200" y="130" width="100" height="240" rx="14" fill="#000" transform="rotate(120 250 250)" opacity="0.3"/>
        </svg>
      </div>

      <!-- 19. Lightbulb-card : carte avec filament stylisé -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="100" y="100" width="300" height="300" rx="28" stroke="#000" stroke-width="22" fill="none"/>
          <path d="M180 250 L220 210 L250 300 L280 200 L320 250" stroke="#000" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

      <!-- 20. Cartes en mouvement (glissement, tri) -->
      <div class="cell">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="70" y="180" width="110" height="140" rx="14" fill="#000"/>
          <rect x="200" y="180" width="110" height="140" rx="14" fill="#000" opacity="0.6"/>
          <rect x="330" y="180" width="110" height="140" rx="14" fill="#000" opacity="0.3"/>
          <path d="M70 390 H440" stroke="#000" stroke-width="10" opacity="0.4"/>
        </svg>
      </div>
    </div>
  </body>
</html>
