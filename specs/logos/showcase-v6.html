      * { margin: 0; padding: 0; box-sizing: border-box; }

        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        border-bottom: 1px solid #e5e5e5;
      }
      .grid { display: grid; grid-template-columns: repeat(2, 1fr); }
      .cell {
        min-height: 200px;
        border: 1px solid #e5e5e5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px 28px;
      }
      .dark { background: #0c0c14; border-color: #2d2d40; }
      .beige { background: #E8E0D8; border-color: #d4cbc0; }
      .combo { display: flex; align-items: center; gap: 16px; }
      .combo-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; }
      .wm { font-size: 44px; line-height: 1; }
    </style>
